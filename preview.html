              style:{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'11px 16px',background:'#F8FAFC',border:'1.5px solid #E2E8F0',borderRadius:14,textDecoration:'none',color:'#1A56DB',transition:'all .15s'},
              onMouseEnter:e=>{e.currentTarget.style.background='#EFF6FF';e.currentTarget.style.borderColor='#93C5FD';},
              onMouseLeave:e=>{e.currentTarget.style.background='#F8FAFC';e.currentTarget.style.borderColor='#E2E8F0';},
            },
              React.createElement('div',{style:{display:'flex',alignItems:'center',gap:10}},
                React.createElement('span',{style:{fontSize:16}},'🏨'),
                React.createElement('div',null,
                  React.createElement('div',{style:{fontSize:10,color:'#94A3B8',marginBottom:1}},'호텔 · 리조트'),
                  React.createElement('div',{style:{fontSize:12,fontWeight:700}},'Booking.com 가격 비교')
                )
              ),
              React.createElement(IC.ExternalLink,{width:13,height:13,style:{opacity:.5}})
            )
          )
        )
      );
    }

    // ── MockMap ───────────────────────────────────────────────────
    function MockMap({places,selected,onSelect}){
      const [lineKey,setLineKey]=useState(0);
      const prevCount=useRef(places.length);
      useEffect(()=>{
        if(places.length!==prevCount.current){ setLineKey(k=>k+1); prevCount.current=places.length; }
      },[places.length]);

      const paths=useMemo(()=>places.slice(0,-1).map((p,i)=>{
        const n=places[i+1];
        const cx=(p.x+n.x)/2;
        const cy=(p.y+n.y)/2-Math.abs(n.x-p.x)*0.18;
        return {d:`M ${p.x} ${p.y} Q ${cx} ${cy} ${n.x} ${n.y}`, color:COLORS[i%COLORS.length]};
      }),[places]);

      return React.createElement('div',{style:{
        position:'relative', width:'100%', height:'100%',
        background:'linear-gradient(150deg,#E4EFF6 0%,#D5E8E0 30%,#CCDFD7 60%,#C8DCD3 100%)',
        overflow:'hidden',
      }},
        // 배경 패턴
        React.createElement('svg',{style:{position:'absolute',inset:0,width:'100%',height:'100%',opacity:.35},viewBox:"0 0 100 100",preserveAspectRatio:"none"},
          React.createElement('ellipse',{cx:"50",cy:"56",rx:"46",ry:"28",fill:"none",stroke:"#7AAD9A",strokeWidth:"0.8",strokeDasharray:"2 1"}),
          React.createElement('ellipse',{cx:"84",cy:"34",rx:"9",ry:"7",fill:"none",stroke:"#7AAD9A",strokeWidth:"0.5",strokeDasharray:"1.5 1"}),
          React.createElement('path',{d:"M 8 50 Q 50 46 92 50",stroke:"#B0CCBE",strokeWidth:"0.7",fill:"none"}),
          React.createElement('path',{d:"M 46 10 L 46 88",stroke:"#B0CCBE",strokeWidth:"0.5"}),
          [15,30,45,60,75].map(v=>React.createElement(React.Fragment,{key:v},
            React.createElement('line',{x1:v,y1:"0",x2:v,y2:"100",stroke:"#A8C4B8",strokeWidth:"0.15",strokeDasharray:"1 4"}),
            React.createElement('line',{x1:"0",y1:v,x2:"100",y2:v,stroke:"#A8C4B8",strokeWidth:"0.15",strokeDasharray:"1 4"})
          ))
        ),

        // 경로선
        React.createElement('svg',{
          key:lineKey,
          style:{position:'absolute',inset:0,width:'100%',height:'100%',pointerEvents:'none'},
          viewBox:"0 0 100 100", preserveAspectRatio:"none"
        },
          React.createElement('defs',null,
            React.createElement('filter',{id:"glow",x:"-30%",y:"-30%",width:"160%",height:"160%"},
              React.createElement('feGaussianBlur',{stdDeviation:"0.6",result:"blur"}),
              React.createElement('feMerge',null,
                React.createElement('feMergeNode',{in:"blur"}),
                React.createElement('feMergeNode',{in:"SourceGraphic"})
              )
            )
          ),
          paths.map((path,i)=>React.createElement('g',{key:i},
            React.createElement('path',{d:path.d,stroke:"white",strokeWidth:"1.6",fill:"none",strokeOpacity:.7,strokeLinecap:"round"}),
            React.createElement('path',{d:path.d,stroke:path.color,strokeWidth:"0.9",fill:"none",strokeLinecap:"round",strokeDasharray:"2.5 1.2",filter:"url(#glow)",style:{strokeDashoffset:200,animation:`drawPath 0.9s cubic-bezier(0.4,0,.2,1) ${i*.18}s forwards`}})
          ))
        ),

        // 마커들
        places.map((place,i)=>{
          const color=COLORS[i%COLORS.length];
          const isSel=selected?.id===place.id;
          return React.createElement('div',{
            key:place.id,
            onClick:()=>onSelect(place),
            style:{
              position:'absolute', left:`${place.x}%`, top:`${place.y}%`,
              transform:'translate(-50%,-100%)', cursor:'pointer',
              zIndex:isSel?30:10,
              animation:`popIn 0.45s cubic-bezier(0.34,1.56,0.64,1) ${i*.12}s both`,
            }
          },
            isSel && React.createElement('div',{style:{
              position:'absolute', bottom:'108%', left:'50%', transform:'translateX(-50%)',
              background:'rgba(15,23,42,.88)', color:'white', padding:'5px 10px',
              borderRadius:8, fontSize:11.5, fontWeight:600, whiteSpace:'nowrap',
              pointerEvents:'none', backdropFilter:'blur(4px)',
              boxShadow:'0 4px 12px rgba(0,0,0,.2)',
            }},
              place.emoji+' '+place.name,
              React.createElement('div',{style:{position:'absolute',top:'100%',left:'50%',transform:'translateX(-50%)',width:0,height:0,borderLeft:'5px solid transparent',borderRight:'5px solid transparent',borderTop:'5px solid rgba(15,23,42,.88)'}})
            ),
            React.createElement('div',{style:{display:'flex',flexDirection:'column',alignItems:'center',transition:'transform .2s cubic-bezier(0.34,1.56,0.64,1)',transform:isSel?'scale(1.22)':'scale(1)'}},
              React.createElement('div',{style:{
                width:isSel?36:32, height:isSel?36:32,
                borderRadius:'50% 50% 50% 0', transform:'rotate(-45deg)',
                background:isSel?`linear-gradient(135deg,${color},${color}BB)`:'white',
                border:`3px solid ${color}`,
                display:'flex', alignItems:'center', justifyContent:'center',
                boxShadow:isSel?`0 6px 20px ${color}55`:'0 3px 10px rgba(0,0,0,.18)',
                transition:'all .2s',
                animation:isSel?'pulse 1.8s ease-in-out infinite':'none',
              }},
                React.createElement('span',{style:{transform:'rotate(45deg)',fontSize:isSel?13:12,fontWeight:800,color:isSel?'white':color}},i+1)
              ),
              React.createElement('div',{style:{width:isSel?10:8,height:isSel?5:4,background:'rgba(0,0,0,.12)',borderRadius:'50%',marginTop:-1,transition:'all .2s'}})
            )
          );
        }),

        places.length===0 && React.createElement('div',{style:{
          position:'absolute',inset:0,display:'flex',flexDirection:'column',
          alignItems:'center',justifyContent:'center',gap:12,color:'#94A3B8',
          animation:'slideUp 0.4s ease',
        }},
          React.createElement(IC.MapPin,{width:44,height:44,style:{opacity:.3}}),
          React.createElement('p',{style:{fontSize:14,fontWeight:500,textAlign:'center',lineHeight:1.6}},'왼쪽 사이드바에서\n장소를 추가해보세요')
        )
      );
    }

    // ── Sidebar ───────────────────────────────────────────────────
    function Sidebar({mode,setMode,places,code,copied,onCopy,onAdd,onRemove,onSelect,selected}){
      const totalMin=places.reduce((s,p)=>s+(p.route?.min??0),0);
      const totalKm=places.reduce((s,p)=>s+(p.route?.km??0),0);

      return React.createElement('div',{style:{
        width:340,minWidth:340,height:'100%',background:'white',
        borderRight:'1px solid #F1F5F9',display:'flex',flexDirection:'column',
        boxShadow:'4px 0 24px rgba(0,0,0,.04)',zIndex:10,
      }},
        // 헤더
        React.createElement('div',{style:{padding:'18px 18px 14px',borderBottom:'1px solid #F8FAFC'}},
          React.createElement('div',{style:{display:'flex',alignItems:'center',gap:10,marginBottom:14}},
            React.createElement('div',{style:{width:40,height:40,borderRadius:12,background:'linear-gradient(135deg,#6366F1,#8B5CF6)',display:'flex',alignItems:'center',justifyContent:'center',boxShadow:'0 4px 14px rgba(99,102,241,.4)'}},
              React.createElement(IC.Navigation,{width:19,height:19,style:{color:'white'}})),
            React.createElement('div',null,
              React.createElement('div',{style:{fontSize:15,fontWeight:800,color:'#0F172A'}},'제주도 3박 4일'),
              React.createElement('div',{style:{fontSize:11,color:'#94A3B8',marginTop:1}},
                `${places.length}개 장소 · ${Math.floor(totalMin/60)>0?Math.floor(totalMin/60)+'시간 ':''}${totalMin%60}분 · ${totalKm.toFixed(1)}km`)
            )
          ),

          // 모드 토글
          React.createElement('div',{style:{display:'flex',background:'#F8FAFC',borderRadius:12,padding:4,gap:4,marginBottom:mode==='team'?12:0}},
            [{key:'personal',label:'개인 모드',Icon:IC.User},{key:'team',label:'팀 모드',Icon:IC.Users}].map(({key,label,Icon})=>{
              const active=mode===key;
              return React.createElement('button',{key,onClick:()=>setMode(key),style:{
                flex:1,display:'flex',alignItems:'center',justifyContent:'center',gap:6,
                padding:'8px 0', background:active?'white':'transparent', border:'none',
                borderRadius:9, fontSize:13, fontWeight:active?700:400,
                color:active?'#6366F1':'#94A3B8', cursor:'pointer',
                boxShadow:active?'0 1px 6px rgba(0,0,0,.08)':'none', transition:'all .2s',
              }},
                React.createElement(Icon,{width:14,height:14}), label
              );
            })
          ),

          mode==='team' && React.createElement('div',{style:{
            background:'linear-gradient(135deg,#EEF2FF,#F5F3FF)',border:'1px solid #E0E7FF',
            borderRadius:14, padding:'12px 14px', display:'flex', alignItems:'center', gap:10,
            animation:'slideUp .3s ease',
          }},
            React.createElement('div',{style:{flex:1}},
              React.createElement('div',{style:{fontSize:9,color:'#6366F1',fontWeight:700,letterSpacing:'.08em',marginBottom:4,textTransform:'uppercase'}},'초대 코드'),
              React.createElement('div',{style:{fontSize:18,fontWeight:900,color:'#3730A3',letterSpacing:'.12em',fontFamily:'monospace'}},code)
            ),
            React.createElement('button',{onClick:onCopy,style:{
              display:'flex',alignItems:'center',gap:6,padding:'9px 16px',
              background:copied?'linear-gradient(135deg,#10B981,#059669)':'linear-gradient(135deg,#6366F1,#8B5CF6)',
              border:'none',borderRadius:11,color:'white',fontSize:12,fontWeight:700,
              cursor:'pointer',
              boxShadow:copied?'0 4px 14px rgba(16,185,129,.4)':'0 4px 14px rgba(99,102,241,.4)',
              transition:'all .2s',whiteSpace:'nowrap',
            }},
              copied?React.createElement(IC.Check,{width:13,height:13}):React.createElement(IC.Copy,{width:13,height:13}),
              copied?'복사됨!':'복사'
            )
          )
        ),

        // 장소 리스트
        React.createElement('div',{style:{flex:1,overflowY:'auto',padding:'14px 16px 8px'}},
          places.length===0
            ? React.createElement('div',{style:{height:'100%',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:12,color:'#94A3B8',padding:'32px 0'}},
                React.createElement(IC.MapPin,{width:36,height:36,style:{opacity:.3}}),
                React.createElement('p',{style:{fontSize:13,textAlign:'center',lineHeight:1.7}},'아래 버튼으로\n첫 장소를 추가해보세요')
              )
            : places.map((place,i)=>React.createElement(React.Fragment,{key:place.id},
                React.createElement(PlaceCard,{place,index:i,isSelected:selected?.id===place.id,onSelect,onRemove}),
                i<places.length-1 && React.createElement(RouteConnector,{route:places[i+1].route,idx:i})
              ))
        ),

        // 장소 추가 버튼
        React.createElement('div',{style:{padding:'12px 16px 20px',borderTop:'1px solid #F8FAFC'}},
          React.createElement('button',{
            onClick:onAdd,
            style:{
              width:'100%',display:'flex',alignItems:'center',justifyContent:'center',gap:8,
              padding:13, background:'linear-gradient(135deg,#6366F1,#8B5CF6)',
              border:'none',borderRadius:14,color:'white',fontSize:14,fontWeight:700,
              cursor:'pointer',boxShadow:'0 4px 18px rgba(99,102,241,.45)',transition:'all .2s',
            },
            onMouseEnter:e=>{e.currentTarget.style.transform='translateY(-2px)';e.currentTarget.style.boxShadow='0 8px 24px rgba(99,102,241,.55)';},
            onMouseLeave:e=>{e.currentTarget.style.transform='translateY(0)';e.currentTarget.style.boxShadow='0 4px 18px rgba(99,102,241,.45)';},
          },
            React.createElement(IC.Plus,{width:18,height:18}), '장소 추가하기'
          )
        )
      );
    }

    // ── MapArea ───────────────────────────────────────────────────
    function MapArea({places,selected,onSelect,onClose}){
      const [tMode,setTMode]=useState(0);
      const totalMin=places.reduce((s,p)=>s+(p.route?.min??0),0);
      const totalKm=places.reduce((s,p)=>s+(p.route?.km??0),0);
      const modes=[{l:'자동차',I:IC.Car},{l:'대중교통',I:IC.Bus},{l:'도보',I:IC.Walk}];

      return React.createElement('div',{style:{flex:1,position:'relative',overflow:'hidden'}},
        React.createElement('div',{style:{position:'absolute',top:16,left:16,zIndex:50,display:'flex',gap:6}},
          modes.map(({l,I},i)=>React.createElement('button',{key:i,onClick:()=>setTMode(i),style:{
            display:'flex',alignItems:'center',gap:5,padding:'7px 14px',
            background:i===tMode?'white':'rgba(255,255,255,.7)',
            border:i===tMode?'2px solid #6366F1':'1.5px solid rgba(255,255,255,.6)',
            borderRadius:20,fontSize:12,fontWeight:i===tMode?700:400,
            color:i===tMode?'#6366F1':'#64748B',cursor:'pointer',
            backdropFilter:'blur(8px)',boxShadow:'0 2px 10px rgba(0,0,0,.08)',transition:'all .2s',
          }},
            React.createElement(I,{width:13,height:13}), l
          ))
        ),

        React.createElement(MockMap,{places,selected,onSelect}),
        selected && React.createElement(InfoWindow,{place:selected,index:places.findIndex(p=>p.id===selected.id),onClose}),

        React.createElement('div',{style:{
          position:'absolute',bottom:20,left:'50%',transform:'translateX(-50%)',
          background:'rgba(255,255,255,.94)',backdropFilter:'blur(14px)',borderRadius:18,
          padding:'11px 28px',display:'flex',gap:28,alignItems:'center',
          boxShadow:'0 4px 28px rgba(0,0,0,.10)',border:'1px solid rgba(255,255,255,.9)',
          animation:'slideUp .5s ease',
        }},
          [{label:'총 장소',value:`${places.length}곳`},
           {label:'총 거리',value:`${totalKm.toFixed(1)}km`},
           {label:'이동 시간',value:totalMin>=60?`${Math.floor(totalMin/60)}h ${totalMin%60}m`:`${totalMin}분`}
          ].map(({label,value})=>React.createElement('div',{key:label,style:{textAlign:'center'}},
            React.createElement('div',{style:{fontSize:10,color:'#94A3B8',marginBottom:2,fontWeight:500}},label),
            React.createElement('div',{style:{fontSize:15,fontWeight:800,color:'#0F172A'}},value)
          )),
          React.createElement('div',{style:{width:1,height:32,background:'#E2E8F0',margin:'0 4px'}}),
          React.createElement('button',{
            onClick:()=>alert('🔗 일정 공유 링크 복사!\nhttps://gabojago.app/trips/jeju/3nights-4days/t8xK2m'),
            style:{
              display:'flex',alignItems:'center',gap:6,padding:'8px 16px',
              background:'linear-gradient(135deg,#6366F1,#8B5CF6)',border:'none',borderRadius:12,
              color:'white',fontSize:12,fontWeight:700,cursor:'pointer',
              boxShadow:'0 3px 12px rgba(99,102,241,.4)',transition:'all .2s',
            },
            onMouseEnter:e=>e.currentTarget.style.transform='scale(1.04)',
            onMouseLeave:e=>e.currentTarget.style.transform='scale(1)',
          },
            React.createElement(IC.Copy,{width:13,height:13}), '공유하기'
          )
        )
      );
    }

    // ── Root ──────────────────────────────────────────────────────
    function App(){
      const [mode,setMode]=useState('personal');
      const [selected,setSelected]=useState(null);
      const [code]=useState(genCode);
      const [copied,setCopied]=useState(false);
      const poolIdx=useRef(3);

      const [places,setPlaces]=useState(()=>[
        {...PLACE_POOL[0],id:1,route:null},
        {...PLACE_POOL[1],id:2,route:genRoute(PLACE_POOL[0].x,PLACE_POOL[0].y,PLACE_POOL[1].x,PLACE_POOL[1].y)},
        {...PLACE_POOL[2],id:3,route:genRoute(PLACE_POOL[1].x,PLACE_POOL[1].y,PLACE_POOL[2].x,PLACE_POOL[2].y)},
      ]);

      const addPlace=useCallback(()=>{
        if(poolIdx.current>=PLACE_POOL.length) poolIdx.current=3;
        const np=PLACE_POOL[poolIdx.current++];
        setPlaces(prev=>{
          const last=prev[prev.length-1];
          return [...prev,{...np,id:prev.length+1,route:genRoute(last.x,last.y,np.x,np.y)}];
        });
      },[]);

      const removePlace=useCallback((id)=>{
        setPlaces(prev=>{
          const f=prev.filter(p=>p.id!==id);
          return f.map((p,i)=>({...p,id:i+1,route:i===0?null:genRoute(f[i-1].x,f[i-1].y,p.x,p.y)}));
        });
        setSelected(s=>s?.id===id?null:s);
      },[]);

      const copyCode=useCallback(()=>{
        try{ navigator.clipboard.writeText(`https://gabojago.app/room/${code}`); }catch{}
        setCopied(true); setTimeout(()=>setCopied(false),2000);
      },[code]);

      return React.createElement(React.Fragment,null,
        React.createElement('style',null,STYLES),
        React.createElement('div',{style:{
          display:'flex',height:'100vh',background:'#F8FAFC',
          fontFamily:"'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif",
          overflow:'hidden',
        }},
          React.createElement(Sidebar,{mode,setMode,places,code,copied,onCopy:copyCode,onAdd:addPlace,onRemove:removePlace,onSelect:setSelected,selected}),
          React.createElement(MapArea,{places,selected,onSelect:setSelected,onClose:()=>setSelected(null)})
        )
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
  </script>
</body>
</html>
